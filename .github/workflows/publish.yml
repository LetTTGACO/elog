name: Publish

on:
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Run the one-time Nx Release migration bootstrap'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Publish packages
        run: |
          if [ "${{ inputs.bootstrap }}" = "true" ]; then
            pnpm nx release 1.0.0-beta.2 --first-release --yes
          else
            pnpm nx release --preid=beta --yes
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TAG: beta
